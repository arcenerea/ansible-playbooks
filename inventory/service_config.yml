---
# =============================================================================
# service_config.yml — Configure and manage system services
# Author: Nerea Arce | github.com/arcenerea
# =============================================================================

- name: Service Configuration
  hosts: all
  become: true

  vars:
    services_to_enable:
      - name: ssh
        state: started
      - name: ufw
        state: started
      - name: fail2ban
        state: started

    services_to_disable:
      - cups
      - bluetooth

  tasks:

    - name: Enable and start required services
      service:
        name: "{{ item.name }}"
        state: "{{ item.state }}"
        enabled: true
      loop: "{{ services_to_enable }}"

    - name: Disable unnecessary services
      service:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop: "{{ services_to_disable }}"
      ignore_errors: true

    - name: Configure SSH service
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^MaxSessions', line: 'MaxSessions 5' }
        - { regexp: '^ClientAliveInterval', line: 'ClientAliveInterval 300' }
        - { regexp: '^ClientAliveCountMax', line: 'ClientAliveCountMax 2' }
      notify: Restart SSH

    - name: Set system timezone
      timezone:
        name: Europe/Stockholm

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted
