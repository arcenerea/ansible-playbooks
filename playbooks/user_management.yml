---
# =============================================================================
# user_management.yml — Create, delete and manage Linux users and groups
# Author: Nerea Arce | github.com/arcenerea
# =============================================================================

- name: User Management
  hosts: all
  become: true

  vars:
    users_to_create:
      - name: deploy
        groups: sudo
        shell: /bin/bash
        ssh_key: "ssh-rsa AAAAB3... deploy@example.com"
      - name: monitor
        groups: adm
        shell: /bin/bash
        ssh_key: "ssh-rsa AAAAB3... monitor@example.com"

    users_to_delete:
      - olduser

  tasks:

    - name: Ensure groups exist
      group:
        name: "{{ item.groups }}"
        state: present
      loop: "{{ users_to_create }}"

    - name: Create users
      user:
        name: "{{ item.name }}"
        groups: "{{ item.groups }}"
        shell: "{{ item.shell }}"
        create_home: true
        state: present
      loop: "{{ users_to_create }}"

    - name: Set SSH authorized keys
      authorized_key:
        user: "{{ item.name }}"
        key: "{{ item.ssh_key }}"
        state: present
      loop: "{{ users_to_create }}"

    - name: Grant sudo access
      lineinfile:
        path: /etc/sudoers.d/{{ item.name }}
        line: "{{ item.name }} ALL=(ALL) NOPASSWD:ALL"
        create: true
        validate: "visudo -cf %s"
      loop: "{{ users_to_create }}"
      when: "'sudo' in item.groups"

    - name: Delete old users
      user:
        name: "{{ item }}"
        state: absent
        remove: true
      loop: "{{ users_to_delete }}"
